<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
    color: #fff;
    overflow: hidden;
  }
  .title {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #fff 0%, #e2e8f0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 28px;
    font-weight: 400;
    color: #94a3b8;
    margin-bottom: 48px;
    line-height: 1.4;
  }
  .stats {
    display: flex;
    gap: 48px;
    margin-bottom: 48px;
  }
  .stat {
    display: flex;
    flex-direction: column;
  }
  .stat-number {
    font-size: 42px;
    font-weight: 700;
    color: #60a5fa;
  }
  .stat-label {
    font-size: 16px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .badge {
    display: inline-block;
    background: rgba(96, 165, 250, 0.15);
    border: 1px solid rgba(96, 165, 250, 0.3);
    color: #93c5fd;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 500;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    left: 100px;
    right: 100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .asu {
    font-size: 20px;
    color: #64748b;
    font-weight: 500;
  }
  .asu span {
    color: #ffc627;
  }
</style>
</head>
<body>
  <div class="title">EdTech Founder Stack</div>
  <div class="subtitle">AI-powered skills for edtech founders. Research-backed. Opinionated.</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number">10</div>
      <div class="stat-label">AI Skills</div>
    </div>
    <div class="stat">
      <div class="stat-number">376</div>
      <div class="stat-label">Research Papers</div>
    </div>
    <div class="stat">
      <div class="stat-number">15</div>
      <div class="stat-label">Validated Jobs</div>
    </div>
  </div>
  <div class="badge">Works with Claude Code, Codex CLI, Gemini CLI, Cursor</div>
  <div class="footer">
    <div class="asu">Built by <span>ASU</span> ScaleU</div>
    <div class="asu">SXSW EDU 2026</div>
  </div>
</body>
</html>
